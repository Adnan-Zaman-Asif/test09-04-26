<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form One Page</title>

        <style>
        body{
            background-color: #414141;
            color: #ffffff;
        }
        .submit_button{
            background-color: rgba(11, 193, 238, 0.959);
            color: black;
            padding-bottom: 5px;
            padding-top: 5px;
            padding-left: 15px;
            padding-right: 15px;
            border: solid #000000e5;
            border-radius: 8px;
            width: 15%;
            align-items: left;
        }
        .input_box{
            background-color: rgba(226, 230, 18, 0.959);
            color: black;
            padding-bottom: 5px;
            padding-top: 5px;
            padding-left: 15px;
            padding-right: 15px;
            border: solid #000000e5;
            border-radius: 8px;
            width: 350px;
        }
        .label_box{
            background-color: rgba(236, 56, 11, 0.959);
            color: rgb(255, 255, 255);
            padding-bottom: 5px;
            padding-top: 5px;
            padding-left: 15px;
            padding-right: 15px;
            border: solid #000000e5;
            border-radius: 8px;
            width: 350px;
        }

    </style>
</head>
<body>
    <h1>Forms in HTML </h1>
    
    <form action="/action.php" method="GET" accept-charset="UTF-16" autocomplete="on">
        <label for="first_name" class="label_box">First Name</label>
        <input class="input_box" type="text" placeholder="First Name" name="" id="first_name">
        <br  />
        <br  />
        <label for="last_name" class="label_box">Last Name</label>
        <input class="input_box" type="text" placeholder="Last Name" name="" id="last_name">
        <br  />
        <br  />
        <label for="address" class="label_box">Address </label>
        <input type="text" class="input_box" placeholder="Address" name="" id="address">
        <br  />
        <br  />
        <label class="label_box" for="email_id">Email Id</label>
        <input class="input_box" type="text" placeholder="Email Id" name="" id="email_id">
        <br  />
        <br  />
        <label class="label_box" for="password">Enter Passsword</label>
        <input class="input_box" type="password" placeholder="Your Password" name="" id="password">
        <br  />
        <br  />
        <!-- <input class="submit_button" type="submit" value="Submit"> -->
         <input type="button" class="submit_button" value="Submit Your Data">
    </form>
</body>
</html>
